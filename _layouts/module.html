---
layout: default
---
<div class="breadcrumb">
  <a href="{{ site.baseurl }}/bootcamp/">Bootcamp</a>
  <span aria-hidden="true">›</span>
  <span>{{ page.title }}</span>
</div>

{% if page.tldr %}
<div class="tldr">
  <strong>TL;DR</strong> {{ page.tldr }}
</div>
{% endif %}

{{ content }}

<nav class="module-nav" aria-label="Module navigation">
  {% if page.prev_url %}
  <a class="module-nav__prev" href="{{ site.baseurl }}{{ page.prev_url }}">← {{ page.prev_title }}</a>
  {% else %}
  <span class="module-nav__prev"></span>
  {% endif %}
  {% if page.next_url %}
  <a class="module-nav__next" href="{{ site.baseurl }}{{ page.next_url }}">{{ page.next_title }} →</a>
  {% endif %}
</nav>
