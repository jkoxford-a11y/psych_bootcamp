  - name: Gemini
    provider: Google
    free_tier: "Yes — Gemini 1.5 Flash"
    paid_tier: "Google One AI Premium, $19.99/month"
    strengths: "Integrated with Google Workspace (Docs, Gmail, Drive). Best option if your institution runs on Google."

  - name: Microsoft Copilot
    provider: Microsoft
    free_tier: "Yes — available via Bing and Edge"
    paid_tier: "Microsoft 365 Copilot (enterprise pricing, varies)"
